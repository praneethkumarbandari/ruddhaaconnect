<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  try {
    const cached = localStorage.getItem('portalTheme');
    if(cached){
      const theme = JSON.parse(cached);
      if(theme.primary_color)
        document.documentElement.style.setProperty('--primary-color', theme.primary_color);
      if(theme.secondary_color)
        document.documentElement.style.setProperty('--secondary-color', theme.secondary_color);
      if(theme.background_color)
        document.documentElement.style.setProperty('--background-color', theme.background_color);
      if(theme.font_family)
        document.documentElement.style.setProperty('--font-family', theme.font_family);
    }
  } catch(e){}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>
<style>
:root{
  --primary-color:#1f6bff;
  --secondary-color:#dbe7ff;
  --background-color:#f5f7fb;
  --font-family:'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:var(--font-family);}
body{background:var(--background-color);}

/* Header Ribbon */
.header{
  background:white;
  height:70px;
  padding:0 30px;
  display:flex;
  align-items:center;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-area img{width:45px;height:45px;object-fit:contain;display:none;}
.company-name{font-size:20px;font-weight:600;color:#222;}

.container{
  max-width:800px;
  margin:30px auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
  position:relative;
}
.back-link{
  display:inline-block;
  margin-bottom:20px;
  color:var(--primary-color);
  text-decoration:none;
}
.back-link:hover{text-decoration:underline;}
h1{color:var(--primary-color);margin-bottom:20px;text-align:center;}
.profile-pic{display:flex;justify-content:center;margin-bottom:20px;}
.profile-pic img{width:120px;height:120px;border-radius:50%;object-fit:cover;}
.profile-info p{margin:10px 0;color:#333;font-size:16px;}
button{
  display:block;
  margin:20px auto 0;
  background:var(--primary-color);
  color:white;
  border:none;
  padding:12px 25px;
  border-radius:8px;
  cursor:pointer;
}
.button-row{
    display:flex;
    justify-content:center;
    gap:120px;          /* middle gap */
    margin-top:20px;
    padding:0 30px;    /* left/right gap */
}

.button-row button{
    width:180px;       /* same size as original button */
    margin:0;
}
button:hover{opacity:.9;}
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.5);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
  max-width:700px;
  width:95%;
  max-height:80%;
  overflow-y:auto;

  display:flex;
  flex-direction:column;
}
.modal-content h2{
    margin-bottom:20px;
}

.modal-content label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
    font-weight:600;
}

.modal-content select,
.modal-content textarea,
.modal-content input[type="file"]{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

.modal-content textarea{
    height:100px;
    resize:none;
}

.modal-actions {
  margin-top:15px;
  text-align:right;
}
.modal-content label{
    display:block;
    margin-top:12px;
    margin-bottom:5px;
    font-weight:600;
}

.modal-content select,
.modal-content textarea,
.modal-content input[type="file"]{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:12px;
}

.modal-content textarea{
    height:100px;
    resize:none;
}

.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo-area">
    <img id="companyLogo" alt="Company Logo">
    <div class="company-name" id="companyName">Company Name</div>
  </div>
</div>

<div class="container">
  <a href="customer-dashboard.html" class="back-link">← Back</a>
  <h1>My Profile</h1>

  <div class="profile-pic">
   <img id="profilePic"
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
alt="Profile Picture">
  </div>

  <div class="profile-info">
    <p><strong>Customer ID:</strong> <span id="cid"></span></p>
    <p><strong>Name:</strong> <span id="cname"></span></p>
    <p><strong>Unit:</strong> <span id="unit"></span></p>
    <p><strong>Project Name:</strong> <span id="project"></span></p>
    <p><strong>Mobile:</strong> <span id="mobile"></span></p>
    <p><strong>Email:</strong> <span id="email"></span></p>
  </div>

  <div class="button-row">
    <button id="openRequest">Request Support</button>
    <button id="openMyRequests">My Requests</button>
</div>
<!-- Request Support Modal -->
<div class="modal" id="requestModal">
  <div class="modal-content">
    <h2>Request Support</h2>
    <label for="reqType">Request Type</label>
    <select id="reqType">
      <option value="">-- Select --</option>
      <option>Profile Correction</option>
      <option>Document Upload</option>
      <option>Payment Query</option>
      <option>General Request</option>
    </select>

    <label for="reqDetails">Request Details</label>
    <textarea id="reqDetails" placeholder="Describe your request"></textarea>

    <label for="reqFile">Attachment (Optional)</label>
    <input type="file" id="reqFile" accept=".pdf,.jpg,.jpeg,.png">

    <div class="modal-actions">
      <button class="close-btn" id="closeModal">Cancel</button>
      <button class="submit-btn" id="submitRequest">Submit</button>
    </div>
    <div id="reqMessage"></div>
  </div>
</div>

<!-- My Requests Modal -->
<div class="modal" id="requestsModal">
  <div class="modal-content">
    <h2>My Requests</h2>
    <div id="requestsContainer"></div>
    <button class="close-btn" id="closeRequests">Close</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://pgtbciwcamfrkrlfytzp.supabase.co";
const supabaseKey = "sb_publishable_vN7akY7mktTTnTsJdMNc2Q_h3OjN-Qg";
const db = window.supabase.createClient(supabaseUrl, supabaseKey);

// Theme Loader
async function loadTheme(){
  try {
    const { data, error } = await db.from("portal_config").select("*").limit(1).single();
    if(error || !data){ return; }
    if(data.company_name?.trim()){
      document.getElementById("companyName").textContent = data.company_name.trim();
      document.title = data.company_name.trim() + " - My Profile";
    }
    const logo = document.getElementById("companyLogo");
    if(data.logo_path?.trim()){
      logo.src = data.logo_path.trim();
      logo.onload = () => logo.style.display = "block";
      logo.onerror = () => logo.style.display = "none";
    }
    if(data.primary_color?.trim()) document.documentElement.style.setProperty('--primary-color', data.primary_color.trim());
    if(data.secondary_color?.trim()) document.documentElement.style.setProperty('--secondary-color', data.secondary_color.trim());
    if(data.background_color?.trim()) document.documentElement.style.setProperty('--background-color', data.background_color.trim());
    if(data.font_family?.trim()) document.documentElement.style.setProperty('--font-family', data.font_family.trim());
    if(data.dashboard_background?.trim()){
      document.body.style.backgroundImage = "url('" + data.dashboard_background.trim() + "')";
      document.body.style.backgroundSize = "cover";
      document.body.style.backgroundPosition = "center";
    }
  } catch(err){ console.error(err); }
}

document.addEventListener("DOMContentLoaded", async function(){

  // LOAD THEME FIRST
 try{
    await loadTheme();
}catch(err){
    console.error("Theme Load Error", err);
};

  const customerData = localStorage.getItem("loggedCustomer");
  if(!customerData){
      window.location.href="customer-login.html";
      return;
  }

  const customer = JSON.parse(customerData);


  // Populate profile
  document.getElementById("cid").textContent = customer.customer_id||"";
  document.getElementById("cname").textContent = customer.customer_name||"";
  document.getElementById("unit").textContent = customer.unit||"";
  document.getElementById("project").textContent = customer.project||"";
  document.getElementById("mobile").textContent = customer.mobile||"";
  document.getElementById("email").textContent = customer.email||"";
  const profilePic=document.getElementById("profilePic");
  if(customer.profile_pic?.trim()){
    profilePic.src=customer.profile_pic.trim();
    
  } else {
    profilePic.src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
  }


  // Modal helpers
  function openModal(modal){ modal.style.display="flex"; document.body.style.overflow="hidden"; }
  function closeModal(modal){ modal.style.display="none"; document.body.style.overflow="auto"; }

  const requestModal=document.getElementById("requestModal");
  const requestsModal=document.getElementById("requestsModal");
  requestModal.addEventListener("click",e=>{ if(e.target===requestModal) closeModal(requestModal); });
  requestsModal.addEventListener("click",e=>{ if(e.target===requestsModal) closeModal(requestsModal); });

  document.getElementById("openRequest").onclick=()=>openModal(requestModal);
  document.getElementById("closeModal").onclick=()=>closeModal(requestModal);
  document.getElementById("openMyRequests").onclick=()=>loadRequests();
  document.getElementById("closeRequests").onclick=()=>closeModal(requestsModal);

  const reqType=document.getElementById("reqType");
  const reqDetails=document.getElementById("reqDetails");
  const reqFile=document.getElementById("reqFile");
  const submitBtn=document.getElementById("submitRequest");
  const messageBox=document.getElementById("reqMessage");

  // Submit request
  submitBtn.onclick = async () => {
    const type=reqType.value.trim();
    const details=reqDetails.value.trim();
    const file=reqFile.files[0];
    if(!type||!details){
      messageBox.textContent="Request Type and Details are required";
      return;
    }
    submitBtn.disabled=true;
    submitBtn.textContent="Submitting...";
    try{
      let attachmentName=null;
      if(file){ attachmentName=file.name; }
      const { error } = await db.from("customer_requests").insert([{
        customer_id: customer.customer_id,
        customer_name: customer.customer_name,
        request_type: type,
        request_details: details,
        attachment_name: attachmentName,
        status: "Open",
        created_at: new Date().toISOString()
      }]);
      if(error) throw error;
      messageBox.textContent="Request submitted successfully";
      reqType.value=""; reqDetails.value=""; reqFile.value="";
      setTimeout(()=>{ closeModal(requestModal); messageBox.textContent=""; },1500);
    }catch(err){
  console.error(err);
  messageBox.textContent = "Unable to submit request. Please try again.";
    }finally{
      submitBtn.disabled=false;
      submitBtn.textContent="Submit";
    }
  };

  // Load requests
  async function loadRequests(){
    openModal(requestsModal);
    const container=document.getElementById("requestsContainer");
    container.textContent="Loading...";
    try{
      const { data, error } = await db.from("customer_requests")
        .select("*")
        .eq("customer_id", customer.customer_id)
        .order("created_at",{ascending:false});
      if(error) throw error;
      if(!data||data.length===0){
        container.innerHTML="<div class='empty-state'>No Requests Found</div>";
        return;
      }
      container.innerHTML="";
      data.forEach(req=>{
        const card=document.createElement("div");
        card.className="request-card";
        const id=document.createElement("div");
        id.textContent="Request ID: "+req.id;
        const type=document.createElement("div");
        type.textContent="Type: "+(req.request_type||"");
        const details=document.createElement("div");
        details.textContent="Details: "+(req.request_details||"");
        const status=document.createElement("div");
        status.textContent="Status: "+(req.status||"");
        const created=document.createElement("div");
        created.textContent="Created: "+(req.created_at?new Date(req.created_at).toLocaleString():"");
        const remark=document.createElement("div");
        remark.textContent="CRM Remarks: "+(req.crm_remark?.trim()?req.crm_remark:"No remarks available");
        card.appendChild(id);
        card.appendChild(type);
        card.appendChild(details);
        card.appendChild(status);
        card.appendChild(created);
        card.appendChild(remark);
        container.appendChild(card);
      });
    }catch(err){
  messageBox.textContent = err.message;
}
  }
});
</script>
</body>
</html>
